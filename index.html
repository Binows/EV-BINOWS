<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV+ NBA Scanner — Binows</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e8e8e8; min-height: 100vh; }
  .topbar { background: #1a1a2e; border-bottom: 1px solid #2a2a3e; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 600; color: #fff; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: #4caf50; }
  .live-badge { background: #3d1a1a; color: #ff6b6b; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; border: 1px solid #ff6b6b44; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 1px solid #3a3a4e; background: transparent; color: #aaa; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: #666; color: #fff; }
  .filter-btn.active { background: #4caf50; color: #fff; border-color: #4caf50; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .metric { background: #1a1a2e; border-radius: 10px; padding: 14px; border: 1px solid #2a2a3e; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .metric-val { font-size: 24px; font-weight: 600; }
  .metric-val.green { color: #4caf50; }
  .metric-val.white { color: #fff; }
  .section-title { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .bet-card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 12px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .bet-card.ev-plus { border-left: 3px solid #4caf50; }
  .bet-card.ev-minus { border-left: 3px solid #e53935; }
  .bet-card.neutral { border-left: 3px solid #666; }
  .bet-left { flex: 1; min-width: 0; }
  .bet-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .bet-player { font-size: 15px; font-weight: 600; color: #fff; }
  .bet-market { font-size: 12px; color: #aaa; background: #2a2a3e; padding: 2px 8px; border-radius: 10px; }
  .bet-game { font-size: 11px; color: #666; margin: 4px 0 10px; }
  .bet-stats { display: flex; gap: 20px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-val { font-size: 13px; color: #ccc; }
  .bet-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .signal { font-size: 22px; }
  .ev-badge { font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
  .ev-badge.pos { background: #1a3d1a; color: #4caf50; border: 1px solid #4caf5044; }
  .ev-badge.neg { background: #3d1a1a; color: #e53935; border: 1px solid #e5393544; }
  .ev-badge.neu { background: #2a2a2a; color: #888; border: 1px solid #44444444; }
  .odd-val { font-size: 14px; font-weight: 600; color: #fff; }
  .kelly { font-size: 11px; color: #888; }
  .book-tag { font-size: 10px; color: #666; }
  .footer { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; flex-wrap: wrap; gap: 8px; }
  .footer-txt { font-size: 11px; color: #555; }
  .req-info { font-size: 11px; color: #555; }
  .refresh-btn { font-size: 13px; padding: 8px 18px; border-radius: 8px; border: 1px solid #3a3a4e; background: transparent; color: #aaa; cursor: pointer; }
  .refresh-btn:hover { background: #2a2a3e; color: #fff; }
  .loading { text-align: center; padding: 40px; color: #666; font-size: 14px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #333; border-top-color: #4caf50; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 40px; color: #555; font-size: 14px; }
  @media (max-width: 600px) { .metrics { grid-template-columns: repeat(2, 1fr); } .bet-card { flex-direction: column; align-items: flex-start; } .bet-right { flex-direction: row; flex-wrap: wrap; } }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><div class="logo-dot"></div>EV+ NBA Scanner<span class="live-badge">AO VIVO</span></div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('pos',this)">Só EV+</button>
    <button class="filter-btn" onclick="setFilter('pts',this)">Pontos</button>
    <button class="filter-btn" onclick="setFilter('reb',this)">Rebotes</button>
    <button class="filter-btn" onclick="setFilter('ast',this)">Assistências</button>
  </div>
</div>
<div class="container">
  <div class="metrics">
    <div class="metric"><div class="metric-label">EV+ encontrados</div><div class="metric-val green" id="cnt-pos">—</div></div>
    <div class="metric"><div class="metric-label">Melhor EV+</div><div class="metric-val green" id="best-ev">—</div></div>
    <div class="metric"><div class="metric-label">Props analisados</div><div class="metric-val white" id="cnt-total">—</div></div>
    <div class="metric"><div class="metric-label">Atualizado</div><div class="metric-val white" style="font-size:16px;" id="last-update">—</div></div>
  </div>
  <div class="section-title">player props de hoje — NBA</div>
  <div id="bet-list"><div class="loading"><span class="spinner"></span>Buscando odds reais...</div></div>
  <div class="footer">
    <span class="footer-txt">odds reais via The Odds API (Pinnacle/DraftKings) • by Binows</span>
    <span class="req-info" id="req-info"></span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">Atualizar</button>
  </div>
</div>
<script>
const ODDS_API_KEY = 'a66ec6d8e3911951e9c061e0243445db';
const BASE = 'https://api.the-odds-api.com/v4';
const SPORT = 'basketball_nba';
const MARKETS = 'player_points,player_rebounds,player_assists';
const BOOKMAKERS = 'pinnacle,draftkings,fanduel';

const MARKET_LABELS = {
  player_points: 'pontos',
  player_rebounds: 'rebotes',
  player_assists: 'assistências',
  player_points_alternate: 'pontos',
  player_rebounds_alternate: 'rebotes',
  player_assists_alternate: 'assistências',
};

let allBets = [], activeFilter = 'todos';

function americanToDecimal(odds) {
  if (odds > 0) return parseFloat((odds / 100 + 1).toFixed(3));
  return parseFloat((100 / Math.abs(odds) + 1).toFixed(3));
}

function calcEV(prob, odd) { return parseFloat(((prob / 100 * odd - 1) * 100).toFixed(1)); }
function calcKelly(prob, odd) { return parseFloat((Math.max(0, (prob / 100 * odd - 1) / (odd - 1) * 100)).toFixed(1)); }

function devig(outcomes) {
  const total = outcomes.reduce((s, o) => s + 1 / o.price, 0);
  return outcomes.map(o => ({ ...o, prob: parseFloat(((1 / o.price / total) * 100).toFixed(1)) }));
}

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = 'Atualizando...'; btn.disabled = true;
  document.getElementById('bet-list').innerHTML = '<div class="loading"><span class="spinner"></span>Buscando odds reais da NBA...</div>';

  try {
    const url = `${BASE}/sports/${SPORT}/events?apiKey=${ODDS_API_KEY}`;
    const eventsRes = await fetch(url);
    const events = await eventsRes.json();

    if (!Array.isArray(events) || events.length === 0) {
      document.getElementById('bet-list').innerHTML = '<div class="empty">Nenhum jogo encontrado para hoje.</div>';
      btn.textContent = 'Atualizar'; btn.disabled = false;
      return;
    }

    const today = new Date().toISOString().split('T')[0];
    const now = new Date();
   const todayEvents = events.filter(e => {
  const gameTime = new Date(e.commence_time);
  return e.commence_time.startsWith(today) && gameTime > now;
});
    const useEvents = todayEvents.length > 0 ? todayEvents : events.slice(0, 3);

    const bets = [];
    let reqUsed = 0;

    for (const event of useEvents.slice(0, 4)) {
      const propUrl = `${BASE}/sports/${SPORT}/events/${event.id}/odds?apiKey=${ODDS_API_KEY}&regions=us&markets=${MARKETS}&bookmakers=${BOOKMAKERS}&oddsFormat=american`;
      const propRes = await fetch(propUrl);
      reqUsed++;

      const remaining = propRes.headers.get('x-requests-remaining');
      if (remaining) document.getElementById('req-info').textContent = `${remaining} req restantes`;

      const propData = await propRes.json();
      if (!propData.bookmakers) continue;

      const gameStr = `${event.away_team} @ ${event.home_team}`;

      const playerMap = {};
      for (const book of propData.bookmakers) {
        for (const market of book.markets) {
          const marketLabel = MARKET_LABELS[market.key];
          if (!marketLabel) continue;
          for (const outcome of market.outcomes) {
            if (outcome.name !== 'Over') continue;
            const key = `${outcome.description}||${market.key}||${outcome.point}`;
            if (!playerMap[key]) playerMap[key] = { player: outcome.description, market: marketLabel, marketKey: market.key, line: outcome.point, game: gameStr, books: [] };
            const decOdd = americanToDecimal(outcome.price);
            playerMap[key].books.push({ book: book.key, odd: decOdd });
          }
        }
      }

      for (const [, data] of Object.entries(playerMap)) {
        if (data.books.length < 2) continue;
        const best = data.books.reduce((a, b) => a.odd > b.odd ? a : b);
        const deviggedProbs = devig(data.books.map(b => ({ price: b.odd })));
        const fairProb = deviggedProbs.reduce((s, o) => s + o.prob, 0) / deviggedProbs.length;
        const ev = calcEV(fairProb, best.odd);
        const kelly = calcKelly(fairProb, best.odd);
        const casaProb = Math.round(100 / best.odd);
        bets.push({
          player: data.player,
          market: `${data.line}+ ${data.market}`,
          marketType: data.marketKey.includes('point') ? 'pts' : data.marketKey.includes('rebound') ? 'reb' : 'ast',
          game: data.game,
          myProb: parseFloat(fairProb.toFixed(1)),
          casaProb,
          odd: best.odd,
          book: best.book,
          kelly,
          ev,
          numBooks: data.books.length
        });
      }
    }

    allBets = bets.sort((a, b) => b.ev - a.ev);
    const pos = allBets.filter(b => b.ev > 2);
    document.getElementById('cnt-pos').textContent = pos.length;
    document.getElementById('cnt-total').textContent = allBets.length;
    const best = pos.length > 0 ? Math.max(...pos.map(b => b.ev)) : 0;
    document.getElementById('best-ev').textContent = best > 0 ? `+${best.toFixed(1)}%` : '—';
    const now = new Date();
    document.getElementById('last-update').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    render();

  } catch (e) {
    console.error(e);
    document.getElementById('bet-list').innerHTML = '<div class="empty">Erro ao buscar dados. Verifique sua chave de API.</div>';
  }
  btn.textContent = 'Atualizar'; btn.disabled = false;
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); render();
}

function render() {
  let data = allBets;
  if (activeFilter === 'pos') data = allBets.filter(b => b.ev > 2);
  if (activeFilter === 'pts') data = allBets.filter(b => b.marketType === 'pts');
  if (activeFilter === 'reb') data = allBets.filter(b => b.marketType === 'reb');
  if (activeFilter === 'ast') data = allBets.filter(b => b.marketType === 'ast');
  if (data.length === 0) { document.getElementById('bet-list').innerHTML = '<div class="empty">Nenhuma aposta encontrada para esse filtro.</div>'; return; }
  document.getElementById('bet-list').innerHTML = data.map(b => {
    let cc, sig, bc, bt;
    if (b.ev > 2) { cc = 'ev-plus'; sig = '🟢'; bc = 'pos'; bt = `+${b.ev}%`; }
    else if (b.ev < -2) { cc = 'ev-minus'; sig = '🔴'; bc = 'neg'; bt = `${b.ev}%`; }
    else { cc = 'neutral'; sig = '⬜'; bc = 'neu'; bt = 'neutro'; }
    return `<div class="bet-card ${cc}">
      <div class="bet-left">
        <div class="bet-header"><span class="bet-player">${b.player}</span><span class="bet-market">${b.market}</span></div>
        <div class="bet-game">${b.game}</div>
        <div class="bet-stats">
          <div class="stat"><span class="stat-label">prob. fair</span><span class="stat-val">${b.myProb}%</span></div>
          <div class="stat"><span class="stat-label">prob. casa</span><span class="stat-val">${b.casaProb}%</span></div>
          <div class="stat"><span class="stat-label">casas</span><span class="stat-val">${b.numBooks}</span></div>
          <div class="stat"><span class="stat-label">melhor em</span><span class="stat-val">${b.book}</span></div>
        </div>
      </div>
      <div class="bet-right">
        <span class="signal">${sig}</span>
        <span class="ev-badge ${bc}">EV ${bt}</span>
        <span class="odd-val">odd ${b.odd.toFixed(2)}</span>
        ${b.kelly > 0 ? `<span class="kelly">Kelly: ${b.kelly}% banca</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

loadData();
</script>
</body>
</html>
